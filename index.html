<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高維修仙數據演武場 - 42馬赫遁術與精確禦力版</title>
    <style>
        body {
            margin: 0; padding: 15px;
            background-color: #08080c; color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { margin: 0; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); font-size: 22px; }
        
        .timer-container {
            display: flex; gap: 20px; margin: 8px 0;
            background: #11111e; padding: 6px 15px; border-radius: 6px;
            border: 1px solid #334; font-family: monospace; font-size: 13px;
        }
        .t-real { color: #ffad33; font-weight: bold; }
        .t-sim { color: #00ffff; font-weight: bold; }

        #control-panel {
            background-color: #12121a; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 10px;
            width: 100%; max-width: 1050px; margin-bottom: 10px; border: 1px solid #232335;
        }
        .faction-container { display: flex; gap: 12px; }
        .faction-box {
            flex: 1; padding: 8px; border-radius: 6px; background: #181824;
            display: flex; flex-direction: column; gap: 5px; border-top: 4px solid #fff;
        }
        .f-mortal { border-top-color: #888888; }
        .f-lianqi { border-top-color: #4dff4d; }
        .f-zhuji { border-top-color: #ff33cc; }
        .faction-box h3 { margin: 0; font-size: 13px; display: flex; justify-content: space-between; }
        .faction-box .eval { font-size: 11px; color: #ffad33; }
        
        .row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
        input[type="number"] { width: 55px; padding: 2px; border-radius: 4px; border: none; background: #050508; color: #fff; text-align: center; }
        select { padding: 2px; border-radius: 4px; background: #050508; color: #00ffcc; border: none; font-size: 11px; }
        
        .global-settings {
            display: flex; justify-content: space-between; align-items: center;
            background: #0b0b12; padding: 6px; border-radius: 6px; border: 1px dashed #445;
        }
        .setting-group { display: flex; align-items: center; gap: 12px; font-size: 12px; }

        #startBtn {
            background: linear-gradient(135deg, #00ffcc, #0077ff); color: #000;
            font-weight: bold; border: none; padding: 6px 18px; border-radius: 5px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        #startBtn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0,255,204,0.5); }
        
        canvas { background-color: #030305; border: 2px solid #1a1a26; border-radius: 6px; }
        #log-panel {
            margin-top: 5px; background: #08080f; padding: 6px; border-radius: 6px;
            width: 100%; max-width: 1030px; height: 95px; overflow-y: auto;
            font-family: monospace; font-size: 11px; color: #a4e3e6; border: 1px solid #151522;
        }
    </style>
</head>
<body>

    <h1>高維修仙戰鬥模擬器</h1>
    
    <div class="timer-container">
        <div>🖥️ 觀測物理外設步長: <span id="frameRateDisplay">60 fps</span></div>
        <div class="t-sim">⏱️ 修仙界真實戰鬥逝去時間: <span id="simTimeDisplay">0.000000</span> 秒</div>
    </div>

    <div id="control-panel">
        <div class="faction-container">
            <div class="faction-box f-mortal">
                <h3>凡人 <span class="eval">評價：肉體凡胎</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="mortalCount" value="0"></div>
                <div class="row"><label>移動速度：</label><span>6 - 11 m/s</span></div>
                <div class="row"><label>最大防禦：</label><span>自重 2.2 倍</span></div>
            </div>
            <div class="faction-box f-lianqi">
                <h3>煉氣期1-10層 <span class="eval">評價：玻璃大砲</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="lianqiCount" value="2"></div>
                <div class="row"><label>移動速度：</label><span>140 - 340 m/s</span></div>
                <div class="row"><label>靈氣護體：</label><span>280g TNT / 100次</span></div>
            </div>
            <div class="faction-box f-zhuji">
                <h3>築基初-後期 <span class="eval">評價：你很快</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="zhujiCount" value="2"></div>
                <div class="row"><label>飛行/遁術：</label><span>21馬赫 / 42馬赫</span></div>
                <div class="row"><label>真元護盾：</label><span>3.65噸 TNT / 900次</span></div>
            </div>
        </div>

        <div class="global-settings">
            <div class="setting-group">
                <label>戰場寬度(米)：</label><input type="number" id="mapWidth" value="1100" min="600" max="1600">
                <label>高度(米)：</label><input type="number" id="mapHeight" value="500" min="400" max="900">
                <label>神識觀測速度：</label>
                <select id="timeScale">
                    <option value="0.1">0.1x 慢速解析神識殘影</option>
                    <option value="0.5">0.5x 慢速觀戰</option>
                    <option value="1.0" selected>1.0x 真實修仙界流速</option>
                    <option value="3.0">3.0x 瞬息抹殺</option>
                </select>
            </div>
            <div class="setting-group">
                <button id="startBtn">神識凝聚·開戰！</button>
            </div>
        </div>
    </div>

    <canvas id="arena" width="1100" height="500"></canvas>
    <div id="log-panel">=== 天道演武演算法已重構：高頻環繞身法、42馬赫側向閃避與硬核數據防禦已精確配置 ===</div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const logPanel = document.getElementById('log-panel');
        const simTimeDisplay = document.getElementById('simTimeDisplay');

        let entities = []; let projectiles = []; let particles = []; let floatingTexts = [];
        let gameActive = false;
        
        // 核心動態時間步長設定：1秒劃分為 10000 個微步，確保幾十馬赫超高速移動不穿牆、閃避精確
        const SIM_DT = 0.0001; 
        let totalSimulatedTime = 0;
        let speedAccumulator = 0;

        // 【精確對齊用戶給定數據設定】 1像素 = 1米
        const DATA_CONFIG = {
            mortal: {
                name: '凡人', color: '#888888', radius: 6,
                bodyArmor: 0.002, speed: 9, maxShieldTnt: 0, maxShieldHits: 0,
                attackCd: 1.0, range: 12, dmg: 0.0001, spellSpeed: 10
            },
            lianqi: {
                name: '煉氣修士', color: '#4dff4d', radius: 9,
                bodyArmor: 0.12, // 肉身抗 120g TNT
                speed: 340,      // 敏捷最高 340 m/s
                maxShieldTnt: 0.28, // 靈氣護體抗 280g TNT
                maxShieldHits: 100, // 完全承受 100次 傷害
                attackCd: 0.35, range: 450, 
                dmg: 3.5,        // 掌握五行法術威力 1-5kg TNT (取平均 3.5kg)
                spellSpeed: 1020, // 速度 2-4馬赫 (取3馬赫 1020m/s)
                blastRadius: 50, fuseRadius: 20, dodgeDist: 120
            },
            zhuji: {
                name: '築基大修', color: '#ff33cc', radius: 13,
                bodyArmor: 150,  // 肉身抗 50-200kg TNT (取150kg)
                speed: 7140,     // 飛行 21馬赫 (約7140m/s)
                escapeSpeed: 14280, // 遁術 42馬赫 (14280m/s)
                maxShieldTnt: 3650, // 真元護盾抗 3.65噸 TNT (=3650kg)
                maxShieldHits: 900, // 真元護盾完全承受 900次 傷害
                attackCd: 0.5, range: 900,
                dmg: 5000,       // 掌握法術威力 5噸 TNT (=5000kg)
                spellSpeed: 17000, // 速度 50馬赫 (=17000m/s)
                blastRadius: 150, fuseRadius: 45, dodgeDist: 350
            }
        };

        function addLog(simTime, text) {
            logPanel.innerHTML += `<div>[${simTime.toFixed(5)}s] ${text}</div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        class Entity {
            constructor(id, x, y, type, team) {
                this.id = id; this.x = x; this.y = y; this.type = type; this.team = team;
                let conf = DATA_CONFIG[type];
                this.radius = conf.radius;
                this.speed = conf.speed;
                
                // 防禦三維指標精確初始化
                this.shieldTnt = conf.maxShieldTnt;
                this.shieldHits = conf.maxShieldHits;
                this.bodyAlive = true;
                this.hpPercent = 1.0; // 用百分比表現肉身完好度
                
                this.attackCdTimer = Math.random() * 0.2;
                this.orbitDirection = Math.random() > 0.5 ? 1 : -1;
                this.hasReborn = false;
                this.isDodging = false;
                this.dodgeX = 0; this.dodgeY = 0;
            }

            update(dt) {
                if (this.attackCdTimer > 0) this.attackCdTimer -= dt;

                // 1. 強制物理排斥（徹底粉碎黏連Bug）
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                    let minDist = this.radius + ent.radius + 35; // 保持戰術安全間距
                    if (d < minDist) {
                        let push = (minDist - d) * 0.5;
                        let ang = Math.atan2(this.y - ent.y, this.x - ent.x);
                        this.x += Math.cos(ang) * push;
                        this.y += Math.sin(ang) * push;
                    }
                }

                // 2. 探測敵方威脅與「X馬赫身法避彈」
                let targetProj = null; let minDistProj = Infinity;
                let conf = DATA_CONFIG[this.type];

                if (this.type !== 'mortal') {
                    for (let p of projectiles) {
                        if (p.attackerId === this.id) continue; // 忽略自己發射的
                        let dp = Math.hypot(p.x - this.x, p.y - this.y);
                        if (dp < conf.dodgeDist && dp < minDistProj) {
                            // 點積計算：判斷飛彈是否朝向自己
                            let pVel = Math.hypot(p.vx, p.vy);
                            if (pVel > 0) {
                                let dot = ((this.x - p.x)*p.vx + (this.y - p.y)*p.vy) / (dp * pVel);
                                if (dot > 0.4) { targetProj = p; minDistProj = dp; }
                            }
                        }
                    }
                }

                // 3. 執行閃避或常規環繞走位
                if (targetProj) {
                    this.isDodging = true;
                    // 計算威脅彈道的垂直方向
                    let pVel = Math.hypot(targetProj.vx, targetProj.vy);
                    let perpX = -targetProj.vy / pVel;
                    let perpY = targetProj.vx / pVel;
                    // 決定橫移方向
                    let side = ((this.x - targetProj.x)*perpX + (this.y - targetProj.y)*perpY > 0) ? 1 : -1;
                    
                    // 築基大修在此處爆發 42馬赫遁術 進行瘋狂變向側閃！
                    let currentSpeed = this.type === 'zhuji' ? conf.escapeSpeed : conf.speed;
                    this.dodgeX = perpX * side * currentSpeed * dt;
                    this.dodgeY = perpY * side * currentSpeed * dt;
                    this.x += this.dodgeX;
                    this.y += this.dodgeY;

                    // 釋放殘影特效粒子
                    if (Math.random() < 0.2) {
                        particles.push({
                            x: this.x, y: this.y, radius: this.radius,
                            color: this.type === 'zhuji' ? 'rgba(255, 51, 204, 0.4)' : 'rgba(77, 255, 77, 0.4)',
                            life: 15, isAfterImage: true
                        });
                    }
                } else {
                    this.isDodging = false;
                    // 常規戰術走位：切換至【高頻交錯環繞模式】而非對撞
                    let enemy = this.findNearestEnemy();
                    if (enemy) {
                        let ang = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);

                        // 試圖維持在最大射程的 75% 處進行拉扯
                        let idealDist = conf.range * 0.75;
                        let moveAngle = ang;
                        
                        if (dist > idealDist + 40) {
                            moveAngle = ang + (Math.PI / 4) * this.orbitDirection; // 斜向切入
                        } else if (dist < idealDist - 40) {
                            moveAngle = ang + (Math.PI * 0.75) * this.orbitDirection; // 斜向撤退
                        } else {
                            moveAngle = ang + (Math.PI / 2) * this.orbitDirection; // 純橫向環繞走位
                        }

                        this.x += Math.cos(moveAngle) * this.speed * dt;
                        this.y += Math.sin(moveAngle) * this.speed * dt;

                        if (Math.random() < 0.005) this.orbitDirection *= -1; // 隨機變更環繞軌跡
                    }
                }

                // 地圖鎖死限制
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // 4. 進攻邏輯
                let enemy = this.findNearestEnemy();
                if (enemy && this.attackCdTimer <= 0) {
                    let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist <= conf.range) {
                        this.fireAttack(enemy);
                    }
                }
            }

            findNearestEnemy() {
                let nearest = null; let minDist = Infinity;
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    // 同階即死敵（內戰解鎖）
                    let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                    if (d < minDist) { minDist = d; nearest = ent; }
                }
                return nearest;
            }

            fireAttack(target) {
                let conf = DATA_CONFIG[this.type];
                this.attackCdTimer = conf.attackCd;
                let ang = Math.atan2(target.y - this.y, target.x - this.x);

                if (this.type === 'mortal') {
                    target.takeDamage(conf.dmg, 0, 1, this);
                } else if (this.type === 'lianqi') {
                    // 隨機一次發射 1-3 個法術
                    let count = Math.floor(Math.random() * 3) + 1;
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.2;
                        projectiles.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(ang + spread) * conf.spellSpeed,
                            vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#4dff4d', radius: 4, attackerId: this.id, attackerType: this.type,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                } else if (this.type === 'zhuji') {
                    // 靈活掌控法術，一次發射 1-12 個 50馬赫 五行真元巨弩
                    let count = Math.floor(Math.random() * 12) + 1;
                    addLog(totalSimulatedTime, `⚡ 【築基神通】 大修靈活控火，瞬間爆發出 ${count} 股真元巨弩（50馬赫）！`);
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.35;
                        projectiles.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(ang + spread) * conf.spellSpeed,
                            vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#ff33cc', radius: 5, attackerId: this.id, attackerType: this.type,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                }
            }

            takeDamage(maxTntDmg, distFromEpicenter, blastRadius, attacker) {
                let conf = DATA_CONFIG[this.type];
                
                // 衝擊波實時距離衰減公式：零距離 100% 威力，邊緣逼近 0%
                let damageFactor = Math.max(0, 1 - (distFromEpicenter / blastRadius));
                let actualTntDmg = maxTntDmg * damageFactor;

                if (actualTntDmg <= 0) return;

                let logMsg = "";
                
                // 一、防禦層判定：真元護盾 / 靈氣護體
                if (this.shieldTnt > 0 && this.shieldHits > 0) {
                    this.shieldHits--; // 扣除一次承受次數
                    
                    if (actualTntDmg <= this.shieldTnt) {
                        // 護盾成功抗下
                        this.shieldTnt -= actualTntDmg;
                        let remPercent = ((this.shieldTnt / conf.maxShieldTnt)*100).toFixed(0);
                        floatingTexts.push({ x: this.x, y: this.y - 15, text: `🛡️護盾吸收(${remPercent}%)`, color: '#00ffff', life: 25 });
                        return;
                    } else {
                        // 護盾被當場轟穿！剩餘當量破防穿透進入肉身
                        actualTntDmg -= this.shieldTnt;
                        this.shieldTnt = 0;
                        this.shieldHits = 0;
                        logMsg += `💥 護盾被暴力破防！ `;
                    }
                }

                // 二、肉身承受層判定
                if (actualTntDmg <= conf.bodyArmor) {
                    // 肉身抗下，但造成震盪受損
                    let ratio = actualTntDmg / conf.bodyArmor;
                    this.hpPercent -= ratio * 0.15; // 肉身輕微震裂
                    floatingTexts.push({ x: this.x, y: this.y - 15, text: `🦴 肉身硬抗(-${(ratio*15).toFixed(1)}%)`, color: '#ffcc00', life: 25 });
                } else {
                    // 超過肉身防禦極限！
                    let overDmg = actualTntDmg - conf.bodyArmor;
                    this.hpPercent -= (overDmg / conf.bodyArmor); // 按超額比例扣除完好度
                    floatingTexts.push({ x: this.x, y: this.y - 15, text: `🩸 重創! 碎裂`, color: '#ff3333', life: 30 });
                }

                // 三、死亡與滴血重生判定
                if (this.hpPercent <= 0) {
                    if (this.type === 'zhuji' && !this.hasReborn) {
                        // 觸發滴血重生數據：消耗 5% 壽命上限，實力下降 50%
                        this.hasReborn = true;
                        this.hpPercent = 0.5; // 復活後肉身實力降50%
                        this.speed = conf.speed * 0.5; 
                        this.shieldTnt = 0; // 護盾不再重置
                        addLog(totalSimulatedTime, `🩸 【滴血重生】 築基大修肉身破碎，瞬間消耗 5% 壽命凝聚一滴真血逆天復活！此時實力永久跌落 50%！`);
                        for (let i = 0; i < 25; i++) {
                            particles.push({
                                x: this.x, y: this.y, vx: (Math.random() - 0.5) * 600, vy: (Math.random() - 0.5) * 600,
                                radius: Math.random() * 3 + 2, color: 'rgba(255, 0, 50, 0.9)', life: 20
                            });
                        }
                    } else {
                        // 煉氣期直接被打爆，坐實“玻璃大砲，吃個大倒欠99條命”的評價
                        let deathReason = (this.type === 'lianqi' && maxTntDmg > 1) ? "正面遭降維爆轟，吃個大倒欠99條命" : "化為劫灰";
                        addLog(totalSimulatedTime, `💀 【殞落】 ${conf.name} 承受了 ${(actualTntDmg).toFixed(3)}kg TNT 衝擊波，[${deathReason}]！`);
                        this.bodyAlive = false;
                    }
                }
            }

            draw() {
                // 1. 繪製殘影或避彈動作
                if (this.isDodging) {
                    ctx.beginPath(); ctx.arc(this.x - this.dodgeX * 1.5, this.y - this.dodgeY * 1.5, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = this.type === 'zhuji' ? 'rgba(255, 51, 204, 0.25)' : 'rgba(77, 255, 77, 0.25)';
                    ctx.fill();
                }

                // 2. 陣營光圈
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = this.type === 'zhuji' ? '#ff33cc' : '#4dff4d';
                ctx.lineWidth = 1.5; ctx.stroke();

                // 3. 本體
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = DATA_CONFIG[this.type].color;
                ctx.fill();

                // 4. 實體護盾可視化半徑
                if (this.shieldTnt > 0 && this.shieldHits > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = this.type === 'zhuji' ? 'rgba(230, 0, 255, 0.5)' : 'rgba(0, 255, 200, 0.5)';
                    ctx.lineWidth = 2; ctx.stroke();
                }

                // 5. 精確數據血條與盾量條
                let barW = this.radius * 2.8;
                let startY = this.y - this.radius - 12;
                
                // 底色
                ctx.fillStyle = '#222'; ctx.fillRect(this.x - barW/2, startY, barW, 4);
                // 肉身健康度條（綠色）
                ctx.fillStyle = '#00ff00'; ctx.fillRect(this.x - barW/2, startY, barW * Math.max(0, this.hpPercent), 2);
                
                // 護盾賸餘當量條（天藍色）
                let conf = DATA_CONFIG[this.type];
                if (conf.maxShieldTnt > 0) {
                    ctx.fillStyle = '#00ffff'; ctx.fillRect(this.x - barW/2, startY + 2, barW * (this.shieldTnt / conf.maxShieldTnt), 2);
                }
            }
        }

        function triggerExplosion(x, y, blastRadius, maxDamage, attacker) {
            // 生成物理波紋特效
            particles.push({ x: x, y: y, r: 2, maxR: blastRadius, type: attacker.attackerType, isWave: true });

            // 遍歷所有修士，執行實時距離衰減傷害計算
            for (let ent of entities) {
                let dist = Math.hypot(ent.x - x, ent.y - y);
                if (dist <= blastRadius + ent.radius) {
                    ent.takeDamage(maxDamage, dist, blastRadius, attacker);
                }
            }
        }

        function setupGame() {
            entities = []; projectiles = []; particles = []; floatingTexts = [];
            totalSimulatedTime = 0; speedAccumulator = 0;

            canvas.width = parseInt(document.getElementById('mapWidth').value) || 1100;
            canvas.height = parseInt(document.getElementById('mapHeight').value) || 500;

            let mCount = parseInt(document.getElementById('mortalCount').value) || 0;
            let lCount = parseInt(document.getElementById('lianqiCount').value) || 0;
            let zCount = parseInt(document.getElementById('zhujiCount').value) || 0;

            let globalId = 0;

            for (let i = 0; i < mCount; i++) {
                entities.push(new Entity(globalId++, Math.random() * 200 + 50, Math.random() * (canvas.height - 100) + 50, 'mortal', 'A'));
            }
            // 煉氣隨機分散
            for (let i = 0; i < lCount; i++) {
                entities.push(new Entity(globalId++, Math.random() * (canvas.width - 300) + 150, Math.random() * (canvas.height - 100) + 50, 'lianqi', 'B'));
            }
            // 築基相對而立，開局展開超高速博弈
            for (let i = 0; i < zCount; i++) {
                let startX = i % 2 === 0 ? 200 + Math.random()*50 : canvas.width - 250 - Math.random()*50;
                entities.push(new Entity(globalId++, startX, canvas.height/2 + (Math.random()-0.5)*120, 'zhuji', 'C'));
            }

            gameActive = true;
            logPanel.innerHTML = "=== 天道演武開鏡：大修 42馬赫神速拉扯中 ===";
        }

        // 高精度物理微步迭代器 (SIM_DT = 0.0001s)
        function advancePhysicsStep() {
            totalSimulatedTime += SIM_DT;

            // 1. 更新實體狀態
            for (let ent of entities) ent.update(SIM_DT);

            // 2. 更新飛彈航向與近接引信
            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx * SIM_DT;
                p.y += p.vy * SIM_DT;

                let explodeTriggered = false;

                // 空氣感應引信判定：只要進入敵人的感應範圍內，法術當場凌空引爆
                for (let ent of entities) {
                    if (ent.id === p.attackerId) continue;
                    let d = Math.hypot(ent.x - p.x, ent.y - p.y);
                    if (d <= p.fuseRadius + ent.radius) {
                        explodeTriggered = true; break;
                    }
                }

                // 觸碰演武場陣法壁壘
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    explodeTriggered = true;
                }

                if (explodeTriggered) {
                    let attackerInfo = { attackerId: p.attackerId, attackerType: p.attackerType };
                    triggerExplosion(p.x, p.y, p.blastRadius, p.damage, attackerInfo);
                    projectiles.splice(i, 1);
                }
            }

            // 3. 過濾殞落的實體
            entities = entities.filter(e => e.bodyAlive);

            // 4. 特效與飄字步進
            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                if (pt.isWave) {
                    // 衝擊波實時向外擴散
                    pt.r += pt.type === 'zhuji' ? 2200 * SIM_DT : 900 * SIM_DT;
                    if (pt.r >= pt.maxR) particles.splice(i, 1);
                } else {
                    pt.life--; if (pt.life <= 0) particles.splice(i, 1);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                floatingTexts[i].life--;
                if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1);
            }

            // 檢查勝負終局
            if (entities.length <= 1) {
                gameActive = false;
                if (entities.length === 1) {
                    addLog(totalSimulatedTime, `🏆 【演武勝出】 最終存活者：${DATA_CONFIG[entities[0].type].name}(ID:${entities[0].id})！身法絕倫，成功吃雞！`);
                } else {
                    addLog(totalSimulatedTime, `💀 【天道同殤】 連環爆轟引發對流，全場盡數同歸於盡！`);
                }
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 依據用戶選擇的「神識觀測速度」累積物理步長
            if (gameActive) {
                let timeScale = parseFloat(document.getElementById('timeScale').value) || 1.0;
                // 瀏覽器 1 幀（約 0.0166s），若 scale=1，則需要跑 166 步微步
                speedAccumulator += (1 / 60) * timeScale;
                
                while (speedAccumulator >= SIM_DT) {
                    advancePhysicsStep();
                    speedAccumulator -= SIM_DT;
                }
                // 更新上方的真實逝去時間
                simTimeDisplay.innerText = totalSimulatedTime.toFixed(6);
            }

            // 【渲染展示層】
            for (let ent of entities) ent.draw();

            for (let p of projectiles) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.shadowBlur = 8; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0;
            }

            for (let pt of particles) {
                if (pt.isWave) {
                    let alpha = Math.max(0, 1 - (pt.r / pt.maxR));
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                    ctx.strokeStyle = pt.type === 'zhuji' ? `rgba(255, 51, 204, ${alpha * 0.5})` : `rgba(77, 255, 77, ${alpha * 0.6})`;
                    ctx.lineWidth = pt.type === 'zhuji' ? 3 : 1.5; ctx.stroke();
                } else if (pt.isAfterImage) {
                    // 繪製遁術殘影
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
                    ctx.fillStyle = pt.color; ctx.fill();
                }
            }

            for (let ft of floatingTexts) {
                ctx.fillStyle = ft.color; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
            }

            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', setupGame);
        gameLoop();
    </script>
</body>
</html>
