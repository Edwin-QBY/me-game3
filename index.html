<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高維修仙數據演武場 - 時空解封與燃魂免疫版</title>
    <style>
        body {
            margin: 0; padding: 15px;
            background-color: #040406; color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { margin: 0; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); font-size: 22px; }
        
        .timer-container {
            display: flex; gap: 20px; margin: 6px 0;
            background: #0b0b12; padding: 6px 15px; border-radius: 6px;
            border: 1px solid #1f1f2e; font-family: monospace; font-size: 13px;
        }
        .t-sim { color: #00ffff; font-weight: bold; }
        .t-real { color: #ff9933; }

        #control-panel {
            background-color: #0b0b12; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 8px;
            width: 100%; max-width: 1200px; margin-bottom: 10px; border: 1px solid #1c1c2b;
        }
        .faction-container { display: flex; gap: 10px; flex-wrap: wrap; }
        .faction-box {
            flex: 1; min-width: 200px; padding: 8px; border-radius: 6px; background: #12121c;
            display: flex; flex-direction: column; gap: 6px; border-top: 4px solid #fff;
        }
        .f-mortal { border-top-color: #888888; }
        .f-lianqi { border-top-color: #4dff4d; }
        .f-zhuji { border-top-color: #ff33cc; }
        .f-jindan { border-top-color: #ffff00; }
        .faction-box h3 { margin: 0; font-size: 13px; display: flex; justify-content: space-between; }
        .faction-box .eval { font-size: 11px; color: #ffad33; }
        
        .row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
        input[type="number"] { width: 55px; padding: 2px; border-radius: 4px; border: none; background: #050508; color: #fff; text-align: center; }
        select { padding: 3px; border-radius: 4px; background: #050508; color: #00ffcc; border: none; font-size: 11px; }
        
        .global-settings {
            display: flex; justify-content: space-between; align-items: center;
            background: #050508; padding: 8px; border-radius: 6px; border: 1px dashed #2a2a3d; width: 100%; box-sizing: border-box;
        }
        .setting-group { display: flex; align-items: center; gap: 12px; font-size: 12px; }
        .cw-label { color: #ff3366; font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        #startBtn {
            background: linear-gradient(135deg, #ffff00, #ff00cc); color: #000;
            font-weight: bold; border: none; padding: 6px 20px; border-radius: 5px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        #startBtn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(255,255,0,0.5); }
        
        canvas { background-color: #010102; border: 2px solid #12121a; border-radius: 6px; }
        #log-panel {
            margin-top: 5px; background: #020205; padding: 6px; border-radius: 6px;
            width: 100%; max-width: 1180px; height: 125px; overflow-y: auto;
            font-family: monospace; font-size: 11px; color: #a4e3e6; border: 1px solid #0e0e18;
        }
    </style>
</head>
<body>

    <h1>高維修仙戰鬥模擬器 (時空自動解封與燃魂免疫版)</h1>
    
    <div class="timer-container">
        <div class="t-real">🖥️ 現實觀測時間: <span id="realTimeDisplay">0.00</span> 秒</div>
        <div class="t-sim">⏱️ 修仙界真實逝去時間: <span id="simTimeDisplay">0.00000000</span> 秒</div>
    </div>

    <div id="control-panel">
        <div class="faction-container">
            <div class="faction-box f-mortal">
                <h3>凡人 <span class="eval">狀態：天威螻蟻</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="mortalCount" value="5"></div>
                <div class="row"><label>陣營：</label>
                    <select id="mortalTeam"><option value="A">天道盟 (A)</option><option value="B">魔道宗 (B)</option><option value="C" selected>散修 (C)</option></select>
                </div>
                <div class="row"><label>天威防禦：</label><span style="color:#ff3333;">觸碰高階靈壓即汽化</span></div>
            </div>
            <div class="faction-box f-lianqi">
                <h3>煉氣期修士 <span class="eval">技能：多段飛劍</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="lianqiCount" value="3"></div>
                <div class="row"><label>陣營：</label>
                    <select id="lianqiTeam"><option value="A" selected>天道盟 (A)</option><option value="B">魔道宗 (B)</option><option value="C">獨立 (C)</option></select>
                </div>
                <div class="row"><label>技能庫：</label><span>🔥彈幕火球 / 🗡️疾速御劍</span></div>
            </div>
            <div class="faction-box f-zhuji">
                <h3>築基期大修 <span class="eval">技能：天基神雷</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="zhujiCount" value="2"></div>
                <div class="row"><label>陣營：</label>
                    <select id="zhujiTeam"><option value="A">天道盟 (A)</option><option value="B" selected>魔道宗 (B)</option><option value="C">獨立 (C)</option></select>
                </div>
                <div class="row"><label>高維神通：</label><span>🏹真元巨弩 / ⚡天基神雷</span></div>
            </div>
            <div class="faction-box f-jindan">
                <h3>金丹大能 <span class="eval" style="color:#ffff00;">評價：核爆防禦·光速反應</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="jindanCount" value="1"></div>
                <div class="row"><label>陣營：</label>
                    <select id="jindanTeam"><option value="A">天道盟 (A)</option><option value="B">魔道宗 (B)</option><option value="C" selected>獨立 (C)</option></select>
                </div>
                <div class="row"><label>至高法則：</label><span style="color:#ffff00;">🌌瞬移 / 🪐萬法齊發 / 🧬降境重生</span></div>
            </div>
        </div>

        <div class="global-settings">
            <div class="setting-group">
                <label>戰場寬(米)：</label><input type="number" id="mapWidth" value="1150" min="600" max="1600">
                <label>高(米)：</label><input type="number" id="mapHeight" value="500" min="400" max="900">
                <label>神識流速調校：</label>
                <select id="timeScale">
                    <option value="0.00001">0.00001x 剎那芳華·捕捉100納秒光速反應</option>
                    <option value="0.001">0.001x 極境微觀·定格萬法高爆彈幕</option>
                    <option value="0.1" selected>0.10x 慢速解析神識身法</option>
                    <option value="1.0">1.00x 修仙界真實流速</option>
                    <option value="10.0">10.00x 縮地成寸·高頻搏殺</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="cw-label"><input type="checkbox" id="intraRankCombat" checked> 開啟同境界生死內戰</label>
                <button id="startBtn">神識凝聚·開戰！</button>
            </div>
        </div>
    </div>

    <canvas id="arena" width="1150" height="500"></canvas>
    <div id="log-panel">=== 演武天幕重組：極微觀相對論免疫、時空自動解封機制已全面實裝 ===</div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const logPanel = document.getElementById('log-panel');
        const simTimeDisplay = document.getElementById('simTimeDisplay');
        const realTimeDisplay = document.getElementById('realTimeDisplay');

        let entities = []; let projectiles = []; let particles = []; let floatingTexts = [];
        let gameActive = false;
        
        let totalSimulatedTime = 0; let totalRealTime = 0;
        let lastFrameTime = performance.now();

        const DATA_CONFIG = {
            mortal: {
                name: '凡人', color: '#888888', radius: 6, rank: 0,
                bodyArmor: 0.01, speed: 18, maxShieldTnt: 0, maxShieldHits: 0,
                attackCd: 0.6, range: 15, dmg: 0.001, spellSpeed: 20,
                senseRange: 0, lingyaPower: 0
            },
            lianqi: {
                name: '煉氣修士', color: '#4dff4d', radius: 9, rank: 1,
                bodyArmor: 20, speed: 180, maxShieldTnt: 300, maxShieldHits: 30,
                attackCd: 0.12, range: 350, dmg: 45, spellSpeed: 1400, 
                blastRadius: 50, fuseRadius: 15, dodgeDist: 120,
                senseRange: 150, lingyaPower: 120 
            },
            zhuji: {
                name: '築基大修', color: '#ff33cc', radius: 13, rank: 2,
                bodyArmor: 600, speed: 900, escapeSpeed: 1800, maxShieldTnt: 3000, maxShieldHits: 80,
                attackCd: 0.08, range: 800, dmg: 750, spellSpeed: 4800, 
                blastRadius: 130, fuseRadius: 35, dodgeDist: 350,
                senseRange: 550, lingyaPower: 6000 
            },
            jindan: {
                name: '金丹大能', color: '#ffff00', radius: 17, rank: 3,
                bodyArmor: 5000, speed: 3060, escapeSpeed: 6120, maxShieldTnt: 1000000, maxShieldHits: 360, 
                attackCd: 0.15, range: 2000, dmg: 2550000, spellSpeed: 10200, 
                blastRadius: 350, fuseRadius: 60, dodgeDist: 600,
                senseRange: 2000, lingyaPower: 1500000 
            }
        };

        const TEAM_COLORS = { A: '#00ccff', B: '#ff3333', C: '#ffff33' };

        function addLog(simTime, text) {
            logPanel.innerHTML += `<div>[${simTime.toFixed(8)}s] ${text}</div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        class Entity {
            constructor(id, x, y, type, team) {
                this.id = id; this.x = x; this.y = y; this.type = type; this.team = team;
                this.loadRankStats(type);
                this.bodyAlive = true;
                this.attackCdTimer = Math.random() * 0.05;
                this.orbitDirection = Math.random() > 0.5 ? 1 : -1;
                this.hasReborn = false;
                this.isDodging = false; this.wasDodgingBefore = false;
                
                this.teleportCharges = 3;
                this.teleportCdTimer = 0;
                this.burnSoulTimer = 0; 
                
                this.lingyaDebuff = 0; this.isDeterred = false; this.suppressors = [];
            }

            loadRankStats(type) {
                let conf = DATA_CONFIG[type];
                this.type = type;
                this.radius = conf.radius; this.speed = conf.speed; this.rank = conf.rank;
                this.shieldTnt = conf.maxShieldTnt; this.shieldHits = conf.maxShieldHits;
                this.hpPercent = 1.0;
            }

            update(dt) {
                let timeScale = parseFloat(document.getElementById('timeScale').value) || 1.0;
                
                // 🔥 【法理修正：燃魂時空豁免權】
                // 如果處於燃魂反擊期，且時間流速低於0.1x，該個體強制獲得時間增益，使其在現實世界中能流暢反擊
                let relativityCompensation = 1.0;
                if (this.burnSoulTimer > 0 && timeScale < 0.1) {
                    relativityCompensation = 0.1 / timeScale; // 補償至至少 0.1x 的體感速率
                    
                    // 讓燃魂計時器和攻擊冷卻在現實時間中加速扣除，不被時空冰凍卡死
                    this.burnSoulTimer -= dt * (relativityCompensation - 1);
                    if (this.attackCdTimer > 0) this.attackCdTimer -= dt * (relativityCompensation - 1);
                }

                if (this.attackCdTimer > 0) this.attackCdTimer -= dt;
                if (this.burnSoulTimer > 0) this.burnSoulTimer -= dt;

                if (this.type === 'jindan' && this.hpPercent < 1.0) {
                    this.hpPercent = Math.min(1.0, this.hpPercent + (dt / 10.0));
                }

                if (this.type === 'jindan' && this.teleportCharges < 3) {
                    this.teleportCdTimer += dt;
                    if (this.teleportCdTimer >= 3600) {
                        this.teleportCharges++;
                        this.teleportCdTimer = 0;
                    }
                }

                let intraRank = document.getElementById('intraRankCombat').checked;

                // 1. 肉搏斥力
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                    let safetyBuffer = (this.type === 'mortal' || ent.type === 'mortal') ? 1 : 55;
                    let minDist = this.radius + ent.radius + safetyBuffer;
                    if (d < minDist) {
                        let push = (minDist - d) * 0.8;
                        let ang = Math.atan2(this.y - ent.y, this.x - ent.x);
                        this.x += Math.cos(ang) * push; this.y += Math.sin(ang) * push;
                    }
                }

                // 2. 計算移動速度（融入燃魂時空補償）
                let finalSpeed = this.speed;
                if (this.burnSoulTimer > 0) finalSpeed *= 3.5 * relativityCompensation; 
                
                if (this.isDodging && (this.type === 'zhuji' || this.type === 'jindan')) {
                    finalSpeed = DATA_CONFIG[this.type].escapeSpeed * (this.burnSoulTimer > 0 ? 2 : 1) * (this.burnSoulTimer > 0 ? relativityCompensation : 1);
                }
                if (this.isDeterred) finalSpeed *= 0.12; 
                else if (this.lingyaDebuff > 0) finalSpeed *= Math.max(0.05, 1 - this.lingyaDebuff);

                // 3. 飛彈探測
                let targetProj = null; let minDistProj = Infinity;
                let conf = DATA_CONFIG[this.type];

                if (this.type !== 'mortal') {
                    for (let p of projectiles) {
                        let isEnemyProj = (p.attackerTeam !== this.team) || (intraRank && p.attackerType === this.type && p.attackerId !== this.id);
                        if (!isEnemyProj) continue;
                        let dp = Math.hypot(p.x - this.x, p.y - this.y);
                        if (dp < conf.dodgeDist && dp < minDistProj) {
                            let pVel = Math.hypot(p.vx, p.vy);
                            if (pVel > 0) {
                                let dot = ((this.x - p.x)*p.vx + (this.y - p.y)*p.vy) / (dp * pVel);
                                if (dot > 0.4) { targetProj = p; minDistProj = dp; }
                            }
                        }
                    }
                }

                // 4. 移動與空間瞬移
                if (targetProj) {
                    if (this.type === 'jindan' && this.teleportCharges > 0) {
                        this.x = Math.random() * (canvas.width - 60) + 30;
                        this.y = Math.random() * (canvas.height - 60) + 30;
                        this.teleportCharges--;
                        floatingTexts.push({ x: this.x, y: this.y - 30, text: "🌌 空間法則·瞬移！", color: '#ffff00', life: 20 });
                        addLog(totalSimulatedTime, `🌌 [瞬移] 金丹大能(ID:${this.id}) 於百納秒間洞察先機，橫渡虛空！`);
                    } else {
                        this.isDodging = true;
                        let pVel = Math.hypot(targetProj.vx, targetProj.vy);
                        let perpX = -targetProj.vy / pVel; let perpY = targetProj.vx / pVel;
                        let side = ((this.x - targetProj.x)*perpX + (this.y - targetProj.y)*perpY > 0) ? 1 : -1;
                        this.x += perpX * side * finalSpeed * dt; this.y += perpY * side * finalSpeed * dt;

                        if (!this.wasDodgingBefore && Math.random() < 0.1) {
                            this.wasDodgingBefore = true;
                            let txt = this.type === 'jindan' ? "⚡ 180馬赫遁術" : (this.type === 'zhuji' ? "⚡ 挪移" : "💨 閃避");
                            floatingTexts.push({
                                x: this.x, y: this.y - 25, text: txt, life: 15, 
                                color: this.type === 'jindan' ? '#ffff00' : (this.type === 'zhuji' ? '#ff33cc' : '#4dff4d')
                            });
                        }
                    }
                } else {
                    this.isDodging = false; this.wasDodgingBefore = false;
                    let enemy = this.findNearestEnemy();
                    if (enemy) {
                        let ang = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        
                        // 燃魂狀態下，強制貼臉逼近
                        let idealDist = this.burnSoulTimer > 0 ? 10 : (this.type === 'mortal' ? 1 : conf.range * 0.4);
                        let moveAngle = ang;
                        if (this.type !== 'mortal' && this.burnSoulTimer <= 0) {
                            if (dist > idealDist + 20) moveAngle = ang + (Math.PI / 4.5) * this.orbitDirection;
                            else if (dist < idealDist - 20) moveAngle = ang + (Math.PI * 0.7) * this.orbitDirection;
                            else moveAngle = ang + (Math.PI / 2) * this.orbitDirection;
                        }
                        this.x += Math.cos(moveAngle) * finalSpeed * dt;
                        this.y += Math.sin(moveAngle) * finalSpeed * dt;
                    }
                }

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // 5. 施展法術
                let enemy = this.findNearestEnemy();
                if (enemy && this.attackCdTimer <= 0) {
                    let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist <= conf.range) this.fireAttack(enemy);
                }
            }

            findNearestEnemy() {
                let nearest = null; let minDist = Infinity;
                let intraRank = document.getElementById('intraRankCombat').checked;
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    let isEnemy = (ent.team !== this.team) || (intraRank && ent.type === this.type);
                    if (isEnemy) {
                        let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                        if (d < minDist) { minDist = d; nearest = ent; }
                    }
                }
                return nearest;
            }

            fireAttack(target) {
                let conf = DATA_CONFIG[this.type];
                this.attackCdTimer = conf.attackCd;
                let ang = Math.atan2(target.y - this.y, target.x - this.x);

                if (this.type === 'mortal') {
                    target.takeDamage(conf.dmg, 0, 1, this);
                } 
                else if (this.type === 'lianqi') {
                    projectiles.push({
                        x: this.x, y: this.y, vx: Math.cos(ang) * conf.spellSpeed, vy: Math.sin(ang) * conf.spellSpeed,
                        damage: conf.dmg, color: '#4dff4d', radius: 4, attackerId: this.id, attackerType: this.type, attackerTeam: this.team,
                        fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                    });
                } 
                else if (this.type === 'zhuji') {
                    let count = Math.floor(Math.random() * 3) + 2;
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.15;
                        projectiles.push({
                            x: this.x, y: this.y, vx: Math.cos(ang + spread) * conf.spellSpeed, vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#ff33cc', radius: 5, attackerId: this.id, attackerType: this.type, attackerTeam: this.team,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                }
                else if (this.type === 'jindan') {
                    let count = Math.floor(Math.random() * 36) + 1;
                    addLog(totalSimulatedTime, `🪐 [萬法齊發] 金丹大能(ID:${this.id}) 威能全開！引導 ${count} 道萬寶金光！`);
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.55; 
                        projectiles.push({
                            x: this.x, y: this.y, vx: Math.cos(ang + spread) * conf.spellSpeed, vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#ffff00', radius: 6, attackerId: this.id, attackerType: this.type, attackerTeam: this.team,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                }
            }

            takeDamage(maxTntDmg, distFromEpicenter, blastRadius, attacker, isLingya = false) {
                let conf = DATA_CONFIG[this.type];
                let damageFactor = isLingya ? 1.0 : Math.max(0, 1 - (distFromEpicenter / blastRadius));
                let actualTntDmg = maxTntDmg * damageFactor;

                if (actualTntDmg <= 0) return;

                if (this.shieldHits > 0 && conf.maxShieldTnt > 0) {
                    this.shieldHits--;
                    if (actualTntDmg <= conf.maxShieldTnt) {
                        return; 
                    } else {
                        actualTntDmg -= conf.maxShieldTnt; this.shieldHits = 0;
                        floatingTexts.push({ x: this.x, y: this.y - 15, text: `💥 真元護盾爆碎！`, color: '#ff00ff', life: 15 });
                    }
                }

                if (actualTntDmg <= conf.bodyArmor) {
                    this.hpPercent -= (actualTntDmg / conf.bodyArmor) * 0.03; 
                } else {
                    let overDmg = actualTntDmg - conf.bodyArmor;
                    this.hpPercent -= (overDmg / conf.bodyArmor); 
                }

                if (this.hpPercent <= 0) {
                    // 🧬 金丹降境重生
                    if (this.type === 'jindan') {
                        addLog(totalSimulatedTime, `🧬 【神魂重塑】 金丹大能(ID:${this.id}) 金丹碎滅！消耗千年壽命重聚神魂，跌落至【築基期】！`);
                        this.loadRankStats('zhuji'); 
                        this.hpPercent = 1.0;          
                        this.attackCdTimer = 0;        
                        this.burnSoulTimer = 3.0;      // 獲得3秒相對論免疫爆發期
                        this.hasReborn = true; 
                        floatingTexts.push({ x: this.x, y: this.y - 35, text: `🧬 降境重生·燃魂反擊！`, color: '#ff33cc', life: 40 });
                    } 
                    else if (this.type === 'zhuji' && !this.hasReborn) {
                        this.hasReborn = true; this.hpPercent = 0.5; this.speed = conf.speed * 0.6; this.shieldHits = conf.maxShieldHits / 2;
                        addLog(totalSimulatedTime, `🩸 【滴血重生】 築基大修(ID:${this.id}) 燃燒精血逆天續命！`);
                    } else {
                        this.bodyAlive = false;
                        let ripText = isLingya ? `被極致天威靈壓當場氣化` : `碎為劫灰`;
                        addLog(totalSimulatedTime, `💀 【殞落】 ${conf.name}(ID:${this.id}) ${ripText}！`);
                    }
                }
            }

            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = TEAM_COLORS[this.team] || '#ffffff';
                ctx.lineWidth = 2; ctx.stroke();

                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = DATA_CONFIG[this.type].color; ctx.fill();

                if (this.shieldHits > 0 && DATA_CONFIG[this.type].maxShieldTnt > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 10, 0, Math.PI * 2);
                    ctx.strokeStyle = this.type === 'jindan' ? 'rgba(255, 255, 0, 0.5)' : (this.type === 'zhuji' ? 'rgba(255, 0, 255, 0.4)' : 'rgba(0, 255, 200, 0.4)');
                    ctx.stroke();
                }

                // 燃魂特效
                if (this.burnSoulTimer > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 15, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 51, 51, ${Math.sin(performance.now()/50)*0.4 + 0.5})`;
                    ctx.lineWidth = 2; ctx.stroke();
                }

                let barW = this.radius * 2.8; let startY = this.y - this.radius - 12;
                ctx.fillStyle = '#222'; ctx.fillRect(this.x - barW/2, startY, barW, 4);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(this.x - barW/2, startY, barW * Math.max(0, this.hpPercent), 2);
                if (this.shieldHits > 0) {
                    ctx.fillStyle = '#00ffff'; ctx.fillRect(this.x - barW/2, startY + 2, barW * (this.shieldHits / DATA_CONFIG[this.type].maxShieldHits), 2);
                }
            }
        }

        function triggerExplosion(x, y, blastRadius, maxDamage, attacker) {
            particles.push({ x: x, y: y, r: 2, maxR: blastRadius, type: attacker.attackerType, isWave: true });
            for (let ent of entities) {
                if (ent.id === attacker.attackerId) continue; 
                let dist = Math.hypot(ent.x - x, ent.y - y);
                if (dist <= blastRadius + ent.radius) {
                    ent.takeDamage(maxDamage, dist, blastRadius, attacker, false);
                }
            }
        }

        function computeLingyaSystem(dt) {
            for (let ent of entities) {
                ent.lingyaDebuff = 0; ent.isDeterred = false; ent.suppressors = [];
            }
            let intraRank = document.getElementById('intraRankCombat').checked;

            for (let boss of entities) {
                if (boss.type === 'mortal') continue;
                let bConf = DATA_CONFIG[boss.type];
                let targets = [];
                for (let target of entities) {
                    if (target.id === boss.id) continue;
                    let isEnemy = (target.team !== boss.team) || (intraRank && target.type === boss.type);
                    if (!isEnemy) continue;

                    let dist = Math.hypot(target.x - boss.x, target.y - boss.y);
                    if (dist <= bConf.senseRange) targets.push({ ent: target, d: dist });
                }

                if (targets.length === 0) continue;
                let sharedPower = bConf.lingyaPower / targets.length;

                for (let tObj of targets) {
                    let tgt = tObj.ent;
                    if (boss.rank > tgt.rank) {
                        tgt.isDeterred = true;
                        let rankDiff = boss.rank - tgt.rank;
                        let lingyaDmgPerSec = sharedPower * rankDiff * 4.5; 
                        let lingyaDmgPerStep = lingyaDmgPerSec * dt;
                        tgt.takeDamage(lingyaDmgPerStep, 0, 1, { attackerId: boss.id, attackerType: boss.type, attackerTeam: boss.team }, true);
                    }
                    tgt.lingyaDebuff += sharedPower / 600;
                    tgt.suppressors.push({ x: boss.x, y: boss.y, type: boss.type });
                }
            }
        }

        function setupGame() {
            entities = []; projectiles = []; particles = []; floatingTexts = [];
            totalSimulatedTime = 0; totalRealTime = 0;
            lastFrameTime = performance.now();

            canvas.width = parseInt(document.getElementById('mapWidth').value) || 1150;
            canvas.height = parseInt(document.getElementById('mapHeight').value) || 500;

            let mCount = parseInt(document.getElementById('mortalCount').value) || 0;
            let mTeam = document.getElementById('mortalTeam').value;
            let lCount = parseInt(document.getElementById('lianqiCount').value) || 0;
            let lTeam = document.getElementById('lianqiTeam').value;
            let zCount = parseInt(document.getElementById('zhujiCount').value) || 0;
            let zTeam = document.getElementById('zhujiTeam').value;
            let jCount = parseInt(document.getElementById('jindanCount').value) || 0;
            let jTeam = document.getElementById('jindanTeam').value;

            let globalId = 0;
            for (let i = 0; i < mCount; i++) entities.push(new Entity(globalId++, Math.random() * 150 + 50, Math.random() * (canvas.height - 100) + 50, 'mortal', mTeam));
            for (let i = 0; i < lCount; i++) entities.push(new Entity(globalId++, Math.random() * (canvas.width - 500) + 250, Math.random() * (canvas.height - 100) + 50, 'lianqi', lTeam));
            for (let i = 0; i < zCount; i++) entities.push(new Entity(globalId++, i % 2 === 0 ? 300 : canvas.width - 300, canvas.height/2 + (Math.random()-0.5)*180, 'zhuji', zTeam));
            for (let i = 0; i < jCount; i++) entities.push(new Entity(globalId++, canvas.width/2 + (Math.random()-0.5)*100, canvas.height/2 + (Math.random()-0.5)*100, 'jindan', jTeam));

            gameActive = true;
            logPanel.innerHTML = "=== 天道輪迴重組：微觀觀測開啟，相對論豁免已就緒 ===";
        }

        function advancePhysicsStep(dt) {
            totalSimulatedTime += dt;
            computeLingyaSystem(dt);

            for (let ent of entities) ent.update(dt);
            let intraRank = document.getElementById('intraRankCombat').checked;

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx * dt; p.y += p.vy * dt;
                let explodeTriggered = false;

                for (let ent of entities) {
                    if (ent.id === p.attackerId) continue;
                    let isEnemy = (ent.team !== p.attackerTeam) || (intraRank && ent.type === p.attackerType);
                    if (isEnemy) {
                        let d = Math.hypot(ent.x - p.x, ent.y - p.y);
                        if (d <= p.fuseRadius + ent.radius) { explodeTriggered = true; break; }
                    }
                }

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) explodeTriggered = true;

                if (explodeTriggered) {
                    triggerExplosion(p.x, p.y, p.blastRadius, p.damage, { attackerId: p.attackerId, attackerType: p.attackerType, attackerTeam: p.attackerTeam });
                    projectiles.splice(i, 1);
                }
            }

            entities = entities.filter(e => e.bodyAlive);

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                if (pt.isWave) {
                    pt.r += pt.type === 'jindan' ? 7500 * dt : (pt.type === 'zhuji' ? 2000 * dt : 800 * dt);
                    if (pt.r >= pt.maxR) particles.splice(i, 1);
                }
            }

            if (entities.length <= 1) {
                gameActive = false;
                if (entities.length === 1) addLog(totalSimulatedTime, `🏆 【終局】 最終存活大能：${DATA_CONFIG[entities[0].type].name}(ID:${entities[0].id}) 唯我獨尊！`);
                else addLog(totalSimulatedTime, `💀 【大荒俱寂】 全場因果盡散！`);
            }
        }

        function gameLoop() {
            let now = performance.now();
            let frameDelta = (now - lastFrameTime) / 1000;
            lastFrameTime = now;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameActive) {
                totalRealTime += frameDelta;
                let timeScaleSelect = document.getElementById('timeScale');
                let timeScale = parseFloat(timeScaleSelect.value) || 1.0;
                
                // 🔥 【法理修正：天道時空自動解封機制】
                // 檢查戰場上是否還有任何活著的金丹期大能
                let hasJindan = entities.some(e => e.type === 'jindan');
                if (!hasJindan && timeScale < 0.1) {
                    timeScaleSelect.value = "0.1"; // 自動切換回常規慢速
                    timeScale = 0.1;
                    addLog(totalSimulatedTime, "🌌 【天道時空解封】 戰場已無金丹大能！極微觀時空自動解除，流速恢復至 0.1x 慢速解析！");
                }

                let steps = timeScale < 0.001 ? 1 : (timeScale > 10 ? 25 : 12); 
                let step_dt = (frameDelta * timeScale) / steps;
                
                if (frameDelta < 0.4) {
                    for (let i = 0; i < steps; i++) {
                        if (!gameActive) break; 
                        advancePhysicsStep(step_dt);
                    }
                }

                simTimeDisplay.innerText = totalSimulatedTime.toFixed(8);
                realTimeDisplay.innerText = totalRealTime.toFixed(2);
            }

            for (let ent of entities) {
                if (ent.suppressors.length > 0) {
                    for (let s of ent.suppressors) {
                        ctx.beginPath(); ctx.moveTo(s.x, s.y); ctx.lineTo(ent.x, ent.y);
                        ctx.strokeStyle = s.type === 'jindan' ? 'rgba(255, 255, 0, 0.35)' : (s.type === 'zhuji' ? 'rgba(200, 0, 255, 0.22)' : 'rgba(0, 255, 120, 0.16)');
                        ctx.lineWidth = s.type === 'jindan' ? 3 : 1.5;
                        ctx.setLineDash([4, 4]); ctx.stroke(); ctx.setLineDash([]);
                    }
                }
            }

            for (let ent of entities) ent.draw();
            for (let p of projectiles) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.fill();
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                if (pt.isWave) {
                    let alpha = Math.max(0, 1 - (pt.r / pt.maxR));
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                    ctx.strokeStyle = pt.type === 'jindan' ? `rgba(255, 255, 0, ${alpha * 0.6})` : (pt.type === 'zhuji' ? `rgba(255, 51, 204, ${alpha * 0.4})` : `rgba(77, 255, 77, ${alpha * 0.5})`);
                    ctx.lineWidth = pt.type === 'jindan' ? 4 : 2; ctx.stroke();
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.y -= 0.5; ft.life--;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
                else {
                    ctx.fillStyle = ft.color; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', setupGame);
        gameLoop();
    </script>
</body>
</html>
