<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高維修仙數據演武場 - 靈壓與物理修正版</title>
    <style>
        body {
            margin: 0; padding: 15px;
            background-color: #050508; color: #fff;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { margin: 0; color: #00ffcc; text-shadow: 0 0 10px rgba(0,255,204,0.4); font-size: 22px; }
        
        .timer-container {
            display: flex; gap: 20px; margin: 6px 0;
            background: #0f0f18; padding: 6px 15px; border-radius: 6px;
            border: 1px solid #252535; font-family: monospace; font-size: 13px;
        }
        .t-sim { color: #00ffff; font-weight: bold; }
        .t-real { color: #ff9933; }

        #control-panel {
            background-color: #0f0f15; padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 8px;
            width: 100%; max-width: 1050px; margin-bottom: 10px; border: 1px solid #1f1f30;
        }
        .faction-container { display: flex; gap: 12px; }
        .faction-box {
            flex: 1; padding: 8px; border-radius: 6px; background: #141420;
            display: flex; flex-direction: column; gap: 6px; border-top: 4px solid #fff;
        }
        .f-mortal { border-top-color: #888888; }
        .f-lianqi { border-top-color: #4dff4d; }
        .f-zhuji { border-top-color: #ff33cc; }
        .faction-box h3 { margin: 0; font-size: 13px; display: flex; justify-content: space-between; }
        .faction-box .eval { font-size: 11px; color: #ffad33; }
        
        .row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
        input[type="number"] { width: 55px; padding: 2px; border-radius: 4px; border: none; background: #050508; color: #fff; text-align: center; }
        select { padding: 3px; border-radius: 4px; background: #050508; color: #00ffcc; border: none; font-size: 11px; }
        
        .global-settings {
            display: flex; justify-content: space-between; align-items: center;
            background: #07070c; padding: 8px; border-radius: 6px; border: 1px dashed #303045;
        }
        .setting-group { display: flex; align-items: center; gap: 12px; font-size: 12px; }
        .cw-label { color: #ff3366; font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; }

        #startBtn {
            background: linear-gradient(135deg, #00ffcc, #0077ff); color: #000;
            font-weight: bold; border: none; padding: 6px 20px; border-radius: 5px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        #startBtn:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(0,255,204,0.5); }
        
        canvas { background-color: #010102; border: 2px solid #151520; border-radius: 6px; }
        #log-panel {
            margin-top: 5px; background: #030307; padding: 6px; border-radius: 6px;
            width: 100%; max-width: 1030px; height: 95px; overflow-y: auto;
            font-family: monospace; font-size: 11px; color: #a4e3e6; border: 1px solid #10101c;
        }
    </style>
</head>
<body>

    <h1>高維修仙戰鬥模擬器 (重力靈壓與物理修正版)</h1>
    
    <div class="timer-container">
        <div class="t-real">🖥️ 現實觀測時間: <span id="realTimeDisplay">0.00</span> 秒</div>
        <div class="t-sim">⏱️ 修仙界真實逝去時間: <span id="simTimeDisplay">0.000000</span> 秒</div>
    </div>

    <div id="control-panel">
        <div class="faction-container">
            <div class="faction-box f-mortal">
                <h3>凡人 <span class="eval">評價：肉體凡胎</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="mortalCount" value="2"></div>
                <div class="row"><label>陣營：</label>
                    <select id="mortalTeam"><option value="A">天道盟 (A)</option><option value="B">魔道宗 (B)</option><option value="C" selected>散修 (C)</option></select>
                </div>
                <div class="row"><label>距離修正：</label><span>解鎖近身肉搏</span></div>
            </div>
            <div class="faction-box f-lianqi">
                <h3>煉氣期1-10層 <span class="eval">評價：玻璃大砲</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="lianqiCount" value="2"></div>
                <div class="row"><label>陣營：</label>
                    <select id="lianqiTeam"><option value="A" selected>天道盟 (A)</option><option value="B">魔道宗 (B)</option><option value="C">獨立 (C)</option></select>
                </div>
                <div class="row"><label>精神靈壓：</label><span>半徑50米實體壓制</span></div>
            </div>
            <div class="faction-box f-zhuji">
                <h3>築基初-後期 <span class="eval">評價：你很快</span></h3>
                <div class="row"><label>數量：</label><input type="number" id="zhujiCount" value="2"></div>
                <div class="row"><label>陣營：</label>
                    <select id="zhujiTeam"><option value="A">天道盟 (A)</option><option value="B" selected>魔道宗 (B)</option><option value="C">獨立 (C)</option></select>
                </div>
                <div class="row"><label>真元靈壓：</label><span>半徑500米全域覆蓋</span></div>
            </div>
        </div>

        <div class="global-settings">
            <div class="setting-group">
                <label>戰場寬(米)：</label><input type="number" id="mapWidth" value="1100" min="600" max="1600">
                <label>高(米)：</label><input type="number" id="mapHeight" value="500" min="400" max="900">
                <label>神識慢放倍率：</label>
                <select id="timeScale">
                    <option value="0.02">0.02x 究極粒子級慢放</option>
                    <option value="0.1">0.10x 慢速解析神識身法</option>
                    <option value="1.0" selected>1.00x 修仙界真實流速</option>
                    <option value="5.0">5.00x 瞬息抹殺</option>
                </select>
            </div>
            <div class="setting-group">
                <label class="cw-label"><input type="checkbox" id="intraRankCombat" checked> 開啟同境界生死內戰</label>
                <button id="startBtn">神識凝聚·開戰！</button>
            </div>
        </div>
    </div>

    <canvas id="arena" width="1100" height="500"></canvas>
    <div id="log-panel">=== 演武場修正就緒：凡人近身鎖死解除、施術者免傷加載、全自動神識靈壓系統部署完畢 ===</div>

    <script>
        const canvas = document.getElementById('arena');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const logPanel = document.getElementById('log-panel');
        const simTimeDisplay = document.getElementById('simTimeDisplay');
        const realTimeDisplay = document.getElementById('realTimeDisplay');

        let entities = []; let projectiles = []; let particles = []; let floatingTexts = [];
        let gameActive = false;
        
        const SIM_DT = 0.0001; // 高精度物理子步步長
        let totalSimulatedTime = 0;
        let totalRealTime = 0;
        let speedAccumulator = 0;
        let lastFrameTime = performance.now();

        const DATA_CONFIG = {
            mortal: {
                name: '凡人', color: '#888888', radius: 6, rank: 0,
                bodyArmor: 0.002, speed: 9, maxShieldTnt: 0, maxShieldHits: 0,
                attackCd: 1.0, range: 15, dmg: 0.0005, spellSpeed: 12,
                senseRange: 0, lingyaPower: 0
            },
            lianqi: {
                name: '煉氣修士', color: '#4dff4d', radius: 9, rank: 1,
                bodyArmor: 0.12, speed: 340, maxShieldTnt: 0.28, maxShieldHits: 100,
                attackCd: 0.4, range: 450, dmg: 3.5, spellSpeed: 1020,
                blastRadius: 60, fuseRadius: 20, dodgeDist: 150,
                senseRange: 80, lingyaPower: 15  // 50米神識
            },
            zhuji: {
                name: '築基大修', color: '#ff33cc', radius: 13, rank: 2,
                bodyArmor: 150, speed: 7140, escapeSpeed: 14280, maxShieldTnt: 3650, maxShieldHits: 900,
                attackCd: 0.6, range: 900, dmg: 5000, spellSpeed: 17000,
                blastRadius: 160, fuseRadius: 45, dodgeDist: 400,
                senseRange: 550, lingyaPower: 350 // 1.5公里縮尺神識
            }
        };

        const TEAM_COLORS = { A: '#00ccff', B: '#ff3333', C: '#ffff33' };

        function addLog(simTime, text) {
            logPanel.innerHTML += `<div>[${simTime.toFixed(5)}s] ${text}</div>`;
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        class Entity {
            constructor(id, x, y, type, team) {
                this.id = id; this.x = x; this.y = y; this.type = type; this.team = team;
                let conf = DATA_CONFIG[type];
                this.radius = conf.radius;
                this.speed = conf.speed;
                this.rank = conf.rank;
                
                this.shieldTnt = conf.maxShieldTnt;
                this.shieldHits = conf.maxShieldHits;
                this.bodyAlive = true;
                this.hpPercent = 1.0; 
                
                this.attackCdTimer = Math.random() * 0.2;
                this.orbitDirection = Math.random() > 0.5 ? 1 : -1;
                this.hasReborn = false;
                
                this.isDodging = false;
                this.wasDodgingBefore = false;
                this.dodgeX = 0; this.dodgeY = 0;

                // 靈壓實時狀態受體變數
                this.lingyaDebuff = 0;   // 速度壓制比例 (0 ~ 0.95)
                this.isDeterred = false; // 是否被高等修士震懾精神
                this.suppressors = [];   // 正在對自己施加靈壓的源頭ID
            }

            update(dt) {
                if (this.attackCdTimer > 0) this.attackCdTimer -= dt;

                let intraRank = document.getElementById('intraRankCombat').checked;

                // 1. 空間物理斥力優化：凡人邊界縮減至2像素，徹底解決無法近身問題
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                    
                    // 凡人之間或凡人與他人肉搏時，大幅縮小安全距離
                    let safetyBuffer = (this.type === 'mortal' || ent.type === 'mortal') ? 2 : 65;
                    let minDist = this.radius + ent.radius + safetyBuffer;
                    
                    if (d < minDist) {
                        let push = (minDist - d) * 0.8;
                        let ang = Math.atan2(this.y - ent.y, this.x - ent.x);
                        this.x += Math.cos(ang) * push;
                        this.y += Math.sin(ang) * push;
                    }
                }

                // 2. 計算靈壓與震懾對移動速度的實時物理削減
                let finalSpeed = this.speed;
                if (this.isDodging && this.type === 'zhuji') finalSpeed = DATA_CONFIG.zhuji.escapeSpeed;

                // 實裝功能：靈壓造成實體壓制，精神震懾使凡人/低階修士僵直
                if (this.isDeterred) {
                    finalSpeed *= 0.15; // 精神被全面震懾，肉身反應和速度暴跌
                } else if (this.lingyaDebuff > 0) {
                    finalSpeed *= Math.max(0.05, 1 - this.lingyaDebuff); // 全方位實體阻力壓制
                }

                // 3. 探測敵方正面彈頭進行閃避
                let targetProj = null; let minDistProj = Infinity;
                let conf = DATA_CONFIG[this.type];

                if (this.type !== 'mortal') {
                    for (let p of projectiles) {
                        let isEnemyProj = (p.attackerTeam !== this.team) || (intraRank && p.attackerType === this.type && p.attackerId !== this.id);
                        if (!isEnemyProj) continue;

                        let dp = Math.hypot(p.x - this.x, p.y - this.y);
                        if (dp < conf.dodgeDist && dp < minDistProj) {
                            let pVel = Math.hypot(p.vx, p.vy);
                            if (pVel > 0) {
                                let dot = ((this.x - p.x)*p.vx + (this.y - p.y)*p.vy) / (dp * pVel);
                                if (dot > 0.3) { targetProj = p; minDistProj = dp; }
                            }
                        }
                    }
                }

                // 4. 執行挪移走位
                if (targetProj) {
                    this.isDodging = true;
                    let pVel = Math.hypot(targetProj.vx, targetProj.vy);
                    let perpX = -targetProj.vy / pVel; let perpY = targetProj.vx / pVel;
                    let side = ((this.x - targetProj.x)*perpX + (this.y - targetProj.y)*perpY > 0) ? 1 : -1;
                    
                    this.dodgeX = perpX * side * finalSpeed * dt;
                    this.dodgeY = perpY * side * finalSpeed * dt;
                    this.x += this.dodgeX;
                    this.y += this.dodgeY;

                    if (!this.wasDodgingBefore) {
                        this.wasDodgingBefore = true;
                        floatingTexts.push({
                            x: this.x, y: this.y - 25,
                            text: this.type === 'zhuji' ? "⚡ 42M 遁術側閃" : "💨 閃避身法",
                            life: 25, color: this.type === 'zhuji' ? '#ff33cc' : '#4dff4d'
                        });
                    }
                    if (Math.random() < 0.15) {
                        particles.push({
                            x: this.x, y: this.y, radius: this.radius,
                            color: this.type === 'zhuji' ? 'rgba(255, 51, 204, 0.3)' : 'rgba(77, 255, 77, 0.3)',
                            life: 10, isAfterImage: true
                        });
                    }
                } else {
                    this.isDodging = false;
                    this.wasDodgingBefore = false;

                    let enemy = this.findNearestEnemy();
                    if (enemy) {
                        let ang = Math.atan2(enemy.y - this.y, enemy.x - this.x);
                        let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                        
                        // 凡人直接衝向面門決戰，修士保持拉扯
                        let idealDist = this.type === 'mortal' ? 2 : conf.range * 0.7;
                        let moveAngle = ang;
                        
                        if (this.type !== 'mortal') {
                            if (dist > idealDist + 40) moveAngle = ang + (Math.PI / 3.5) * this.orbitDirection;
                            else if (dist < idealDist - 40) moveAngle = ang + (Math.PI * 0.8) * this.orbitDirection;
                            else moveAngle = ang + (Math.PI / 2) * this.orbitDirection;
                        }

                        this.x += Math.cos(moveAngle) * finalSpeed * dt;
                        this.y += Math.sin(moveAngle) * finalSpeed * dt;

                        if (Math.random() < 0.004) this.orbitDirection *= -1;
                    }
                }

                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // 5. 進攻
                let enemy = this.findNearestEnemy();
                if (enemy && this.attackCdTimer <= 0) {
                    let dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                    if (dist <= conf.range) this.fireAttack(enemy);
                }
            }

            findNearestEnemy() {
                let nearest = null; let minDist = Infinity;
                let intraRank = document.getElementById('intraRankCombat').checked;
                for (let ent of entities) {
                    if (ent.id === this.id) continue;
                    let isEnemy = (ent.team !== this.team) || (intraRank && ent.type === this.type);
                    if (isEnemy) {
                        let d = Math.hypot(ent.x - this.x, ent.y - this.y);
                        if (d < minDist) { minDist = d; nearest = ent; }
                    }
                }
                return nearest;
            }

            fireAttack(target) {
                let conf = DATA_CONFIG[this.type];
                this.attackCdTimer = conf.attackCd;
                let ang = Math.atan2(target.y - this.y, target.x - this.x);

                if (this.type === 'mortal') {
                    target.takeDamage(conf.dmg, 0, 1, this);
                } else if (this.type === 'lianqi') {
                    let count = Math.floor(Math.random() * 2) + 1;
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.12;
                        projectiles.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(ang + spread) * conf.spellSpeed, vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#4dff4d', radius: 4, 
                            attackerId: this.id, attackerType: this.type, attackerTeam: this.team,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                } else if (this.type === 'zhuji') {
                    let count = Math.floor(Math.random() * 8) + 1;
                    addLog(totalSimulatedTime, `⚡ [神通] 築基大修(ID:${this.id}) 爆發出 ${count} 股真元巨弩！`);
                    for (let i = 0; i < count; i++) {
                        let spread = (Math.random() - 0.5) * 0.25;
                        projectiles.push({
                            x: this.x, y: this.y,
                            vx: Math.cos(ang + spread) * conf.spellSpeed, vy: Math.sin(ang + spread) * conf.spellSpeed,
                            damage: conf.dmg, color: '#ff33cc', radius: 5, 
                            attackerId: this.id, attackerType: this.type, attackerTeam: this.team,
                            fuseRadius: conf.fuseRadius, blastRadius: conf.blastRadius
                        });
                    }
                }
            }

            takeDamage(maxTntDmg, distFromEpicenter, blastRadius, attacker) {
                let conf = DATA_CONFIG[this.type];
                let damageFactor = Math.max(0, 1 - (distFromEpicenter / blastRadius));
                let actualTntDmg = maxTntDmg * damageFactor;

                if (actualTntDmg <= 0) return;

                if (this.shieldHits > 0 && conf.maxShieldTnt > 0) {
                    this.shieldHits--;
                    if (actualTntDmg <= conf.maxShieldTnt) {
                        floatingTexts.push({ x: this.x, y: this.y - 15, text: `🛡️ 護盾無傷化解`, color: '#00ffff', life: 25 });
                        return;
                    } else {
                        actualTntDmg -= conf.maxShieldTnt;
                        this.shieldHits = 0;
                        floatingTexts.push({ x: this.x, y: this.y - 15, text: `💥 護盾粉碎！`, color: '#ff00ff', life: 25 });
                    }
                }

                if (actualTntDmg <= conf.bodyArmor) {
                    let ratio = actualTntDmg / conf.bodyArmor;
                    this.hpPercent -= ratio * 0.12;
                    floatingTexts.push({ x: this.x, y: this.y - 15, text: `🦴 肉身抗下震盪`, color: '#ffcc00', life: 25 });
                } else {
                    let overDmg = actualTntDmg - conf.bodyArmor;
                    this.hpPercent -= (overDmg / conf.bodyArmor); 
                    floatingTexts.push({ x: this.x, y: this.y - 15, text: `🩸 肉身撕裂！`, color: '#ff3333', life: 25 });
                }

                if (this.hpPercent <= 0) {
                    if (this.type === 'zhuji' && !this.hasReborn) {
                        this.hasReborn = true; this.hpPercent = 0.5; this.speed = conf.speed * 0.5; this.shieldHits = 0;
                        addLog(totalSimulatedTime, `🩸 【滴血重生】 築基大修(ID:${this.id}) 燃燒5%壽命逆天復活，實力跌落50%！`);
                    } else {
                        let reason = (this.type === 'lianqi' && maxTntDmg > 1) ? "吃個大倒欠99條命灰飛煙滅" : "殞落化劫灰";
                        addLog(totalSimulatedTime, `💀 【殞落】 ${conf.name}(ID:${this.id}) 被震碎，[${reason}]！`);
                        this.bodyAlive = false;
                    }
                }
            }

            draw() {
                // 陣營環
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = TEAM_COLORS[this.team] || '#ffffff';
                ctx.lineWidth = 2; ctx.stroke();

                // 本體
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = DATA_CONFIG[this.type].color;
                ctx.fill();

                // 護盾可視化
                if (this.shieldHits > 0 && DATA_CONFIG[this.type].maxShieldTnt > 0) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 9, 0, Math.PI * 2);
                    ctx.strokeStyle = this.type === 'zhuji' ? 'rgba(255, 0, 255, 0.5)' : 'rgba(0, 255, 200, 0.5)';
                    ctx.stroke();
                }

                // 精確數據血條
                let barW = this.radius * 2.8; let startY = this.y - this.radius - 12;
                ctx.fillStyle = '#222'; ctx.fillRect(this.x - barW/2, startY, barW, 4);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(this.x - barW/2, startY, barW * Math.max(0, this.hpPercent), 2);
                if (this.shieldHits > 0) {
                    ctx.fillStyle = '#00ffff'; ctx.fillRect(this.x - barW/2, startY + 2, barW * (this.shieldHits / DATA_CONFIG[this.type].maxShieldHits), 2);
                }
            }
        }

        // 修改點二：全面免疫發射者本人的爆炸波，拒絕自殺
        function triggerExplosion(x, y, blastRadius, maxDamage, attacker) {
            particles.push({ x: x, y: y, r: 2, maxR: blastRadius, type: attacker.attackerType, isWave: true });

            for (let ent of entities) {
                if (ent.id === attacker.attackerId) continue; // 🔥 關鍵修正：完全免疫自己發射法術的餘波震盪
                
                let dist = Math.hypot(ent.x - x, ent.y - y);
                if (dist <= blastRadius + ent.radius) {
                    ent.takeDamage(maxDamage, dist, blastRadius, attacker);
                }
            }
        }

        // 核心修改點四：神識全自動靈壓物理運算子步
        function computeLingyaSystem() {
            // 每步重置所有人的受壓狀態
            for (let ent of entities) {
                ent.lingyaDebuff = 0;
                ent.isDeterred = false;
                ent.suppressors = [];
            }

            let intraRank = document.getElementById('intraRankCombat').checked;

            // 雙循環計算神識範圍內的實體壓制分配
            for (let boss of entities) {
                if (boss.type === 'mortal') continue;
                let bConf = DATA_CONFIG[boss.type];
                
                // 找出在該修士神識範圍內的所有敵對目標
                let targets = [];
                for (let target of entities) {
                    if (target.id === boss.id) continue;
                    let isEnemy = (target.team !== boss.team) || (intraRank && target.type === boss.type);
                    if (!isEnemy) continue;

                    let dist = Math.hypot(target.x - boss.x, target.y - boss.y);
                    if (dist <= bConf.senseRange) {
                        targets.push({ ent: target, d: dist });
                    }
                }

                if (targets.length === 0) continue;

                // 核心規則：多目標時，全方位總壓制力被均分
                let sharedPower = bConf.lingyaPower / targets.length;

                for (let tObj of targets) {
                    let tgt = tObj.ent;
                    
                    // 1. 精神震懾判定：只作用於比自己低階的修士/凡人
                    if (boss.rank > tgt.rank) {
                        tgt.isDeterred = true;
                    }

                    // 2. 實體壓制力疊加 (轉化為移動阻力係數)
                    let suppressFactor = sharedPower / 400; // 歸一化數值
                    tgt.lingyaDebuff += suppressFactor;
                    tgt.suppressors.push({ x: boss.x, y: boss.y, type: boss.type });
                }
            }
        }

        function setupGame() {
            entities = []; projectiles = []; particles = []; floatingTexts = [];
            totalSimulatedTime = 0; totalRealTime = 0; speedAccumulator = 0;
            lastFrameTime = performance.now();

            canvas.width = parseInt(document.getElementById('mapWidth').value) || 1100;
            canvas.height = parseInt(document.getElementById('mapHeight').value) || 500;

            let mCount = parseInt(document.getElementById('mortalCount').value) || 0;
            let mTeam = document.getElementById('mortalTeam').value;
            let lCount = parseInt(document.getElementById('lianqiCount').value) || 0;
            let lTeam = document.getElementById('lianqiTeam').value;
            let zCount = parseInt(document.getElementById('zhujiCount').value) || 0;
            let zTeam = document.getElementById('zhujiTeam').value;

            let globalId = 0;

            for (let i = 0; i < mCount; i++) {
                entities.push(new Entity(globalId++, Math.random() * 150 + 50, Math.random() * (canvas.height - 100) + 50, 'mortal', mTeam));
            }
            for (let i = 0; i < lCount; i++) {
                entities.push(new Entity(globalId++, Math.random() * (canvas.width - 400) + 200, Math.random() * (canvas.height - 100) + 50, 'lianqi', lTeam));
            }
            for (let i = 0; i < zCount; i++) {
                let startX = i % 2 === 0 ? 250 + Math.random()*50 : canvas.width - 300 - Math.random()*50;
                entities.push(new Entity(globalId++, startX, canvas.height/2 + (Math.random()-0.5)*150, 'zhuji', zTeam));
            }

            gameActive = true;
            logPanel.innerHTML = "=== 天道演武大陣重啟：凡人邊界修正，神識壓制力場已全域展開 ===";
        }

        function advancePhysicsStep() {
            totalSimulatedTime += SIM_DT;

            // 實時更新全場神識範圍與靈壓分攤
            computeLingyaSystem();

            for (let ent of entities) ent.update(SIM_DT);

            let intraRank = document.getElementById('intraRankCombat').checked;

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx * SIM_DT; p.y += p.vy * SIM_DT;
                let explodeTriggered = false;

                for (let ent of entities) {
                    if (ent.id === p.attackerId) continue;
                    let isEnemy = (ent.team !== p.attackerTeam) || (intraRank && ent.type === p.attackerType);
                    if (isEnemy) {
                        let d = Math.hypot(ent.x - p.x, ent.y - p.y);
                        if (d <= p.fuseRadius + ent.radius) { explodeTriggered = true; break; }
                    }
                }

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) explodeTriggered = true;

                if (explodeTriggered) {
                    let attackerInfo = { attackerId: p.attackerId, attackerType: p.attackerType, attackerTeam: p.attackerTeam };
                    triggerExplosion(p.x, p.y, p.blastRadius, p.damage, attackerInfo);
                    projectiles.splice(i, 1);
                }
            }

            entities = entities.filter(e => e.bodyAlive);

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                if (pt.isWave) {
                    pt.r += pt.type === 'zhuji' ? 2500 * SIM_DT : 900 * SIM_DT;
                    if (pt.r >= pt.maxR) particles.splice(i, 1);
                }
            }

            if (entities.length <= 1) {
                gameActive = false;
                if (entities.length === 1) addLog(totalSimulatedTime, `🏆 【終局】 最終勝出者：${DATA_CONFIG[entities[0].type].name}(ID:${entities[0].id} / 陣營:${entities[0].team})！`);
                else addLog(totalSimulatedTime, `💀 【同殤】 全員灰飛煙滅，因果盡消！`);
            }
        }

        // 👁️ 渲染與硬體高精度時鐘控制層
        function gameLoop() {
            let now = performance.now();
            let frameDelta = (now - lastFrameTime) / 1000; // 現實世界的真實秒數差
            lastFrameTime = now;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 修改點三：根據調教的戰鬥速度（timeScale），高精度同步調整兩界的時間推進
            if (gameActive) {
                totalRealTime += frameDelta;
                let timeScale = parseFloat(document.getElementById('timeScale').value) || 1.0;
                
                // 累積時間步長，精確驅動子步
                speedAccumulator += frameDelta * timeScale;
                while (speedAccumulator >= SIM_DT) {
                    advancePhysicsStep();
                    speedAccumulator -= SIM_DT;
                }
                
                // 實時刷新上方雙時鐘看板
                simTimeDisplay.innerText = totalSimulatedTime.toFixed(6);
                realTimeDisplay.innerText = totalRealTime.toFixed(2);
            }

            // 【視覺表現力：繪製靈壓引力下沉線】
            for (let ent of entities) {
                if (ent.suppressors.length > 0) {
                    for (let s of ent.suppressors) {
                        ctx.beginPath();
                        ctx.moveTo(s.x, s.y);
                        ctx.lineTo(ent.x, ent.y);
                        // 築基靈壓呈現深紫色重力坍塌線，煉氣呈現淡綠色
                        ctx.strokeStyle = s.type === 'zhuji' ? 'rgba(180, 0, 255, 0.18)' : 'rgba(0, 255, 100, 0.15)';
                        ctx.lineWidth = s.type === 'zhuji' ? 2 : 1;
                        ctx.setLineDash([4, 4]); // 虛線流動感
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                    
                    // 繪製受壓迫者的重力塌陷外圈
                    ctx.beginPath();
                    ctx.arc(ent.x, ent.y, ent.radius + 14, 0, Math.PI * 2);
                    ctx.strokeStyle = ent.isDeterred ? 'rgba(255, 0, 0, 0.4)' : 'rgba(180, 0, 255, 0.3)';
                    ctx.lineWidth = 1; ctx.stroke();
                }
            }

            // 基礎實體渲染
            for (let ent of entities) ent.draw();

            for (let p of projectiles) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.shadowBlur = 6; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                if (pt.isWave) {
                    let alpha = Math.max(0, 1 - (pt.r / pt.maxR));
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
                    ctx.strokeStyle = pt.type === 'zhuji' ? `rgba(255, 51, 204, ${alpha * 0.4})` : `rgba(77, 255, 77, ${alpha * 0.5})`;
                    ctx.lineWidth = pt.type === 'zhuji' ? 3 : 1.5; ctx.stroke();
                } else if (pt.isAfterImage) {
                    pt.life--; if (pt.life <= 0) { particles.splice(i, 1); continue; }
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.radius, 0, Math.PI * 2);
                    ctx.fillStyle = pt.color; ctx.fill();
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i]; ft.y -= 0.4; ft.life--;
                if (ft.life <= 0) { floatingTexts.splice(i, 1); }
                else {
                    ctx.fillStyle = ft.color; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', setupGame);
        gameLoop();
    </script>
</body>
</html>
